name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Build binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o dist/awi-darwin-arm64 ./cmd/ws
          GOOS=darwin GOARCH=amd64 go build -o dist/awi-darwin-amd64 ./cmd/ws
          GOOS=linux GOARCH=amd64 go build -o dist/awi-linux-amd64 ./cmd/ws
          GOOS=linux GOARCH=arm64 go build -o dist/awi-linux-arm64 ./cmd/ws
          GOOS=windows GOARCH=amd64 go build -o dist/awi-windows-amd64.exe ./cmd/ws
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
