name: Build

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            TAG="dev"
          fi
          go build -ldflags "-X github.com/jzOcb/awi/cmd.Version=${TAG}" -o awi ./cmd/awi
      - run: go vet ./...
      - run: go test ./...
